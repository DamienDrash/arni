services:
  # 1. Frontend (Production Build)
  ariia-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_ENABLE_WS=true
      - GATEWAY_INTERNAL_URL=http://ariia-core:8000
    depends_on:
      - ariia-core
    networks:
      - ariia-network

  # 2. ARIIA Core (Production)
  ariia-core:
    build: .
    restart: always
    group_add:
      - 988
    ports:
      - "${CORE_PORT:-8000}:8000"
    command: ["uvicorn", "app.gateway.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "*", "--workers", "2"]
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://ariia-redis:6379/${REDIS_DB:-0}
      - QDRANT_URL=http://ariia-qdrant:6333
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      - SYSTEM_ADMIN_EMAIL=${SYSTEM_ADMIN_EMAIL:-admin@ariia.io}
      - SYSTEM_ADMIN_PASSWORD=${SYSTEM_ADMIN_PASSWORD:-Admin!Password2026}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - GATEWAY_PUBLIC_URL=${GATEWAY_PUBLIC_URL:-http://localhost:3000}
      - DATABASE_URL=postgresql+psycopg://ariia:${POSTGRES_PASSWORD:-ariia_dev_password}@ariia-postgres:5432/${POSTGRES_DB:-ariia}
      - AUTH_SMTP_HOST=${AUTH_SMTP_HOST:-smtp.strato.de}
      - AUTH_SMTP_PORT=${AUTH_SMTP_PORT:-465}
      - AUTH_SMTP_USER=${AUTH_SMTP_USER}
      - AUTH_SMTP_PASS=${AUTH_SMTP_PASS}
      - AUTH_SMTP_FROM=${AUTH_SMTP_FROM:-info@ariia.ai}
    depends_on:
      ariia-redis:
        condition: service_started
        required: false
      ariia-qdrant:
        condition: service_started
        required: false
      ariia-postgres:
        condition: service_started
        required: false
    volumes:
      - ariia_data:/app/data
      - ./config:/app/config
      - ./scripts:/app/scripts
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./skills:/app/skills
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ariia-network

  # 3. Infrastructure (disabled via profiles in staging)
  ariia-qdrant:
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ariia-network
    profiles:
      - infra

  ariia-redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - ariia-network
    profiles:
      - infra

  ariia-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ariia}
      - POSTGRES_USER=ariia
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ariia_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ariia-network
    profiles:
      - infra

  # 4. Workers
  ariia-worker:
    build: .
    restart: always
    command: python scripts/bulk_enrich_worker.py
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://ariia-redis:6379/${REDIS_DB:-0}
      - DATABASE_URL=postgresql+psycopg://ariia:${POSTGRES_PASSWORD:-ariia_dev_password}@ariia-postgres:5432/${POSTGRES_DB:-ariia}
      - AUTH_SECRET=${AUTH_SECRET}
    depends_on:
      - ariia-core
    healthcheck:
      disable: true
    volumes:
      - ariia_data:/app/data
    networks:
      - ariia-network

  ariia-telegram-polling:
    build: .
    restart: always
    command: python scripts/telegram_polling_worker.py
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://ariia-redis:6379/${REDIS_DB:-0}
      - DATABASE_URL=postgresql+psycopg://ariia:${POSTGRES_PASSWORD:-ariia_dev_password}@ariia-postgres:5432/${POSTGRES_DB:-ariia}
      - AUTH_SECRET=${AUTH_SECRET}
    depends_on:
      - ariia-core
    healthcheck:
      disable: true
    volumes:
      - ariia_data:/app/data
    networks:
      - ariia-network

  ariia-email-worker:
    build: .
    restart: always
    command: python scripts/email_polling_worker.py
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://ariia-redis:6379/${REDIS_DB:-0}
      - DATABASE_URL=postgresql+psycopg://ariia:${POSTGRES_PASSWORD:-ariia_dev_password}@ariia-postgres:5432/${POSTGRES_DB:-ariia}
      - AUTH_SECRET=${AUTH_SECRET}
    depends_on:
      - ariia-core
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import redis,os; r=redis.Redis.from_url(os.environ.get(\"REDIS_URL\",\"redis://ariia-redis:6379/0\")); r.ping()'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - .:/app
      - ariia_data:/app/data
    networks:
      - ariia-network

  ariia-campaign-scheduler:
    build: .
    restart: always
    command: python scripts/campaign_scheduler_worker.py
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://ariia-redis:6379/${REDIS_DB:-0}
      - DATABASE_URL=postgresql+psycopg://ariia:${POSTGRES_PASSWORD:-ariia_dev_password}@ariia-postgres:5432/${POSTGRES_DB:-ariia}
      - AUTH_SECRET=${AUTH_SECRET}
      - CAMPAIGN_POLL_INTERVAL=30
      - TRACKING_BASE_URL=${TRACKING_BASE_URL:-https://api.ariia.app}
    depends_on:
      - ariia-core
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import redis,os; r=redis.Redis.from_url(os.environ.get(\"REDIS_URL\",\"redis://ariia-redis:6379/0\")); r.ping()'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ariia_data:/app/data
    networks:
      - ariia-network

  # 7b. Automation Engine Worker
  ariia-automation-engine:
    build: .
    restart: always
    command: python scripts/automation_engine_worker.py
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://ariia-redis:6379/${REDIS_DB:-0}
      - DATABASE_URL=postgresql+psycopg://ariia:${POSTGRES_PASSWORD:-ariia_dev_password}@ariia-postgres:5432/${POSTGRES_DB:-ariia}
      - AUTH_SECRET=${AUTH_SECRET}
      - ENGINE_POLL_INTERVAL=10
    depends_on:
      - ariia-core
    healthcheck:
      disable: true
    volumes:
      - ariia_data:/app/data
    networks:
      - ariia-network

  # 7c. Contact Change Listener
  ariia-contact-listener:
    build: .
    restart: always
    command: python scripts/contact_change_listener_worker.py
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://ariia-redis:6379/${REDIS_DB:-0}
      - DATABASE_URL=postgresql+psycopg://ariia:${POSTGRES_PASSWORD:-ariia_dev_password}@ariia-postgres:5432/${POSTGRES_DB:-ariia}
      - AUTH_SECRET=${AUTH_SECRET}
      - LISTENER_POLL_INTERVAL=60
    depends_on:
      - ariia-core
    healthcheck:
      disable: true
    volumes:
      - ariia_data:/app/data
    networks:
      - ariia-network

  # 7d. Analytics Processing Worker
  ariia-analytics-worker:
    build: .
    restart: always
    command: python scripts/analytics_processing_worker.py
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://ariia-redis:6379/${REDIS_DB:-0}
      - DATABASE_URL=postgresql+psycopg://ariia:${POSTGRES_PASSWORD:-ariia_dev_password}@ariia-postgres:5432/${POSTGRES_DB:-ariia}
      - AUTH_SECRET=${AUTH_SECRET}
      - ANALYTICS_POLL_INTERVAL=2
    depends_on:
      - ariia-core
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import redis,os; r=redis.Redis.from_url(os.environ.get(\"REDIS_URL\",\"redis://ariia-redis:6379/0\")); r.ping()'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ariia_data:/app/data
    networks:
      - ariia-network

  # 7e. Contact Insights Worker (AI Channel Affinity & Smart Send)
  ariia-contact-insights-worker:
    build: .
    restart: always
    command: python scripts/contact_insights_worker.py
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://ariia-redis:6379/${REDIS_DB:-0}
      - DATABASE_URL=postgresql+psycopg://ariia:${POSTGRES_PASSWORD:-ariia_dev_password}@ariia-postgres:5432/${POSTGRES_DB:-ariia}
      - AUTH_SECRET=${AUTH_SECRET}
      - INSIGHTS_POLL_INTERVAL=3600
    depends_on:
      - ariia-core
    healthcheck:
      disable: true
    volumes:
      - ariia_data:/app/data
    networks:
      - ariia-network

  # --- Monitoring Stack (only in production via profiles) ---

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: always
    networks:
      - ariia-network
    profiles:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    restart: always
    networks:
      - ariia-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=GoldStandard2026!
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-www.ariia.ai}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-https://www.ariia.ai/monitor/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    restart: always
    ports:
      - "${GRAFANA_PORT:-3003}:3000"
    depends_on:
      - prometheus
    networks:
      - ariia-network
    profiles:
      - monitoring

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis://ariia-redis:6379
    depends_on:
      ariia-redis:
        condition: service_started
        required: false
    networks:
      - ariia-network
    profiles:
      - monitoring

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      - DATA_SOURCE_NAME=postgresql://ariia:${POSTGRES_PASSWORD:-ariia_dev_password}@ariia-postgres:5432/${POSTGRES_DB:-ariia}?sslmode=disable
    depends_on:
      ariia-postgres:
        condition: service_started
        required: false
    networks:
      - ariia-network
    profiles:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    restart: always
    networks:
      - ariia-network
    profiles:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: always
    networks:
      - ariia-network
    profiles:
      - monitoring

  loki:
    image: grafana/loki:latest
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: always
    networks:
      - ariia-network
    profiles:
      - monitoring

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: always
    networks:
      - ariia-network
    profiles:
      - monitoring

  # WhatsApp WAHA Bridge (QR Code based)
  ariia-whatsapp-bridge:
    image: devlikeapro/waha-plus:noweb
    restart: always
    ports:
      - "${WHATSAPP_PORT:-3002}:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      - WHATSAPP_RESTART_ALL_SESSIONS=true
      - WAHA_PRINT_QR=true
      - WAHA_API_KEY=ariia-waha-secret
      - WAHA_SWAGGER_ENABLED=false
      - WAHA_ZIP_LOGS=true
    volumes:
      - waha_sessions:/app/.sessions
    networks:
      - ariia-network
    profiles:
      - whatsapp

volumes:
  waha_sessions:
  qdrant_data:
  redis_data:
  ariia_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  ariia-network:
    driver: bridge
